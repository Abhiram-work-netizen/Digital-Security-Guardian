name: digital_literacy_guardian
description: "Privacy-first digital safety assistant that monitors real digital behavior."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^0.69.2
  http: ^1.2.2
  url_launcher: ^6.3.1
  flutter_local_notifications: ^18.0.1
  intl: ^0.19.0
  path_provider: ^2.1.5
  google_fonts: ^6.2.1
  smooth_page_indicator: ^1.2.0+3
  percent_indicator: ^4.2.3
  shared_preferences: ^2.3.4
  image_picker: ^1.1.2
  file_picker: ^8.1.6
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A1628"
  adaptive_icon_foreground: "assets/icon.png"
